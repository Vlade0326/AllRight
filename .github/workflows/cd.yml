name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  smoke-test:
    runs-on: ubuntu-latest
    needs: publish-image
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + API
        run: npm run build
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: root
          DB_DATABASE: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: cd-smoke-test-secret-32-chars-min
          ZKP_PEPPER: cd-smoke-zkp-pepper-32-chars-min

      - name: Start API and smoke test
        run: |
          npm run start:prod -w backend &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:3000/health/ready
          curl -sf -X POST http://127.0.0.1:3000/users \
            -H 'Content-Type: application/json' \
            -d '{"email":"cd-smoke@allright.test","password":"SmokeTest123!"}'
          TOKEN=$(curl -sf -X POST http://127.0.0.1:3000/auth/login \
            -H 'Content-Type: application/json' \
            -d '{"email":"cd-smoke@allright.test","password":"SmokeTest123!"}' | jq -r .access_token)
          curl -sf http://127.0.0.1:3000/location/config -H "Authorization: Bearer $TOKEN"
          curl -sf http://127.0.0.1:3000/ -o /dev/null
          curl -sf http://127.0.0.1:3000/app.html -o /dev/null
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: root
          DB_DATABASE: postgres
          DB_SYNCHRONIZE: "true"
          DB_MIGRATIONS_RUN: "false"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: cd-smoke-test-secret-32-chars-min
          ZKP_PEPPER: cd-smoke-zkp-pepper-32-chars-min
